# Koyeb Configuration File
name: police-ocr-backend
services:
  - name: backend
    type: web
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    regions:
      - fra
    instance_type: nano
    scaling:
      min: 1
      max: 1
    env:
      - key: PORT
        value: "8000"
    build:
      type: docker
      dockerfile: Dockerfile
    run:
      command: gunicorn --bind :$PORT backend_cloud:app
